name: Build & Test
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
    test:
        name: Build & Test
        runs-on: ${{ matrix.os }}
        strategy:
          fail-fast: false
          matrix:
            os:
              - ubuntu-latest
              - macos-latest
            ocaml-compiler:
              - '4.14.1'
              - '5.1.0'
        env:
          EXAMPLES_DIR: "tlaplus-examples"
          DEPS_DIR: "tlaplus-examples/deps"
        steps:
            - name: Clone repo
              uses: actions/checkout@v6
            - name: Install deps (ubuntu)
              if: matrix.os == 'ubuntu-latest'
              run: |
                sudo apt-get update
                sudo apt-get install --yes time
            - uses: ocaml/setup-ocaml@v3
              with:
                ocaml-compiler: ${{ matrix.ocaml-compiler }}
            - uses: actions/cache@v4
              id: cache
              with:
                path: _build_cache
                key: ${{ runner.os }}_build_cache
            - name: Install optional dependencies
              if: startsWith(matrix.ocaml-compiler, '5.')
              run: |
                eval $(opam env)
                make opam-deps-opt
            - name: Build TLAPM
              run: |
                eval $(opam env)
                make opam-deps
                # Workaround for https://github.com/tlaplus/tlapm/issues/88
                set +e
                for ((attempt = 1; attempt <= 5; attempt++)); do
                  make clean
                  make
                  if [ $? -eq 0 ]; then
                    make release
                    exit $?
                  fi
                done
                exit 1
            - name: Run tests
              run: |
                eval $(opam env)
                set +e
                make test
                TEST_RESULT=$?
                cat _build/default/test/tests.log
                exit $TEST_RESULT
            - name: show logs for each test file
              if: failure()
              run: |
                find test -type f \
                    -name '*.err' -o \
                    -name '*.out' \
                    -exec cat '{}' \;
            - name: Check library proofs
              run: |
                find ./library -type f -iname "*_proofs.tla"  \
                -print0 | xargs --null --max-args=1           \
                ./_build/tlapm/bin/tlapm --cleanfp --stretch 5
            - name: Check local example proofs
              run: |
                # Skip the longest-running examples so PR CI stays under five minutes.
                find ./examples -type f -name "*.tla"          \
                ! -path "./examples/ByzPaxos/BPConProof.tla"   \
                ! -path "./examples/ByzPaxos/VoteProof.tla"    \
                -print0 | xargs --verbose --null --max-args=1  \
                /usr/bin/time ./_build/tlapm/bin/tlapm --cleanfp --stretch 5
            - name: Clone tlaplus/examples
              uses: actions/checkout@v6
              with:
                repository: tlaplus/examples
                path: ${{ env.EXAMPLES_DIR }}
            - name: Check proofs in TLA+ examples
              run: |
                mkdir -p "$DEPS_DIR"
                cp ./_build/tlapm*.tar.gz "$DEPS_DIR/tlapm.tar.gz"
                tar -xzf "$DEPS_DIR/tlapm.tar.gz" -C "$DEPS_DIR"
                rm "$DEPS_DIR/tlapm.tar.gz"
                mv $DEPS_DIR/tlapm* "$DEPS_DIR/tlapm-install"
                mkdir -p "$DEPS_DIR/community"
                wget -nv https://github.com/tlaplus/CommunityModules/releases/latest/download/CommunityModules-deps.jar -O "$DEPS_DIR/community/modules.jar"
                unzip "$DEPS_DIR/community/modules.jar" -d "$DEPS_DIR/community"
                find "$EXAMPLES_DIR/specifications" -iname "manifest.json" -print0 \
                | xargs --null --no-run-if-empty \
                jq --join-output '
                  .modules
                  | map(select(has("proof")))
                  # Failing on Linux
                  | map(select(.path != "specifications/LoopInvariance/SumSequence.tla"))
                  # Skip checking long-running proofs
                  | map(select(.proof.maxRuntimeMinutes <= 1))
                  | map(.path + "\u0000")
                  | join("")' \
                | xargs --verbose --null --no-run-if-empty -I {TLA_FILE} \
                time "$DEPS_DIR/tlapm-install/bin/tlapm" "$EXAMPLES_DIR/{TLA_FILE}" -I "$DEPS_DIR/community" --stretch 5
